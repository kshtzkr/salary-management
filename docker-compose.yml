services:
  api:
    build:
      context: ./api
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
      RAILS_ENV: development
      JWT_SECRET: development-jwt-secret
    ports:
      - "3001:3000"
    volumes:
      - ./api:/rails
      - bundle_cache:/usr/local/bundle
    command: bash -lc "bundle install && bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0 -p 3000"

  web:
    build:
      context: ./web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      INTERNAL_API_BASE_URL: http://api:3000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: bash -lc "npm install && npm run dev"

volumes:
  bundle_cache:
  web_node_modules:
